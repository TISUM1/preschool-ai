<div class="page-header">
  <div class="back-row">
    <span class="back-btn" onclick="Router.navigate('home')">←</span>
    <h2 id="gen-type-title">📝 生成教案</h2>
  </div>
  <div class="subtitle" id="gen-resource-hint">AI 自动参考资源库中的优秀范文</div>
</div>

<!-- Template Upload (Session Only) -->
<div class="card">
  <div class="card-title">📄 上传参考模板（可选，本次生成后自动丢弃）</div>
  <div id="template-list"></div>
  <input type="file" id="tmpl-upload-input" accept=".docx" multiple style="display:none"
    onchange="GeneratorWorkflow.uploadTemplates(event.target.files, 'template-list')">

  <div class="toggle-row" style="padding:8px 0 0;">
    <div>
      <div class="toggle-label">[✓] 输出相同格式</div>
      <div style="font-size:11px;color:var(--text-muted);">开启后 AI 将保持模板的格式框架</div>
    </div>
    <div class="toggle" id="gen-match-format" onclick="this.classList.toggle('on')"></div>
  </div>
</div>

<!-- Input -->
<div class="card">
  <div class="card-title">🎤 输入要求</div>
  <label class="label">主题</label>
  <input class="input-box" id="gen-topic" placeholder="请输入主题...">
  <label class="label" style="margin-top:10px;">详细要求</label>
  <textarea class="input-box" id="gen-requirements" rows="3" placeholder="描述你的具体需求..."></textarea>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;">
    <div style="display:flex;gap:6px;">
      <span class="chip" data-age="小班" onclick="SettingsPage_selectAge(this)">小班</span>
      <span class="chip selected" data-age="中班" onclick="SettingsPage_selectAge(this)">中班</span>
      <span class="chip" data-age="大班" onclick="SettingsPage_selectAge(this)">大班</span>
    </div>
  </div>
  <input type="hidden" id="gen-agegroup" value="中班">
</div>

<!-- Student Selector (observation type only) -->
<div class="card" id="student-selector-section" style="display:none;">
  <div class="card-title">👶 学生选择（可选）</div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
    <div>
      <div style="font-size:13px;font-weight:500;">随机选取</div>
      <div style="font-size:11px;color:var(--text-muted);">AI 将随机选择一名学生进行观察</div>
    </div>
    <div class="toggle" id="gen-student-random" onclick="GenPage_toggleRandom(this)"></div>
  </div>
  <div id="gen-student-chips" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
  <div style="margin-top:10px;display:flex;gap:8px;">
    <button class="btn btn-outline btn-sm" onclick="Router.navigate('classes')">管理班级</button>
    <span style="font-size:11px;color:var(--text-muted);margin-top:4px;">选中学生后AI将在观察记录中融入该生个性特点</span>
  </div>
</div>

<!-- Generate Button -->
<button class="btn btn-primary btn-block" style="margin-top:8px;font-size:16px;" id="gen-btn">
  🤖 AI 生成
</button>
<div style="font-size:11px;color:var(--text-muted);text-align:center;margin-top:6px;" id="gen-context-hint"></div>

<!-- Preview Area -->
<div class="card" id="gen-preview" style="display:none;min-height:200px;">
  <div class="content-editor" id="gen-preview-content" contenteditable="true"></div>
</div>

<!-- Action Buttons -->
<div id="gen-actions" style="display:none;margin-top:12px;gap:10px;">
  <button class="btn btn-outline btn-block" onclick="GeneratorWorkflow.saveDocument(GeneratorWorkflow._currentType)" style="flex:1;">💾 保存</button>
  <button class="btn btn-primary btn-block" onclick="GeneratorWorkflow.exportDocx()" style="flex:1;">📥 导出 .docx</button>
</div>

<script>
function SettingsPage_selectAge(el) {
  el.parentElement.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('selected'); });
  el.classList.add('selected');
  document.getElementById('gen-agegroup').value = el.dataset.age;
}

// --- Student Selection for Observation ---
var GenPage_selectedStudents = [];

function GenPage_toggleStudentChip(chip, studentId) {
  chip.classList.toggle('selected');
  var idx = GenPage_selectedStudents.indexOf(studentId);
  if (idx > -1) {
    GenPage_selectedStudents.splice(idx, 1);
  } else {
    GenPage_selectedStudents.push(studentId);
  }
  GenPage_updateStudentContext();
}

function GenPage_toggleRandom(toggleEl) {
  toggleEl.classList.toggle('on');
  var chipsContainer = document.getElementById('gen-student-chips');
  var isRandom = toggleEl.classList.contains('on');
  if (chipsContainer) chipsContainer.style.display = isRandom ? 'none' : 'flex';
  if (isRandom) {
    GenPage_pickRandomStudent();
  } else {
    GenPage_selectedStudents = [];
    document.getElementById('student-selector-section').setAttribute('data-selected-students', '');
  }
}

function GenPage_pickRandomStudent() {
  var allChips = document.querySelectorAll('#gen-student-chips .chip');
  if (allChips.length === 0) {
    document.getElementById('student-selector-section').setAttribute('data-selected-students', '');
    return;
  }
  var idx = Math.floor(Math.random() * allChips.length);
  var chip = allChips[idx];
  var info = chip.getAttribute('data-student-info') || '';
  document.getElementById('student-selector-section').setAttribute('data-selected-students', '[随机选取] ' + info);
}

function GenPage_updateStudentContext() {
  var allChips = document.querySelectorAll('#gen-student-chips .chip');
  var parts = [];
  allChips.forEach(function(c) {
    if (c.classList.contains('selected')) {
      var info = c.getAttribute('data-student-info');
      if (info) parts.push(info);
    }
  });
  document.getElementById('student-selector-section').setAttribute('data-selected-students', parts.join('\n'));
}

async function GenPage_loadStudentSelector() {
  var classes = await ClassDB.getAll();
  if (!classes || classes.length === 0) return;

  var allStudents = [];
  for (var i = 0; i < classes.length; i++) {
    var students = await StudentDB.getByClass(classes[i].id);
    students.forEach(function(s) {
      s._className = classes[i].name;
      s._grade = classes[i].grade;
    });
    allStudents = allStudents.concat(students);
  }

  if (allStudents.length === 0) return;

  // Sort by grade then class
  var gradeOrder = { '大班': 1, '中班': 2, '小班': 3 };
  allStudents.sort(function(a, b) {
    var ga = gradeOrder[a._grade] || 2;
    var gb = gradeOrder[b._grade] || 2;
    if (ga !== gb) return ga - gb;
    if (a._className !== b._className) return a._className.localeCompare(b._className);
    return a.name.localeCompare(b.name);
  });

  var container = document.getElementById('gen-student-chips');
  if (!container) return;

  var html = '';
  var lastClass = '';
  allStudents.forEach(function(s) {
    var classLabel = s._className + '（' + (s._grade || '') + '）';
    if (classLabel !== lastClass) {
      html += '<div style="width:100%;font-size:11px;font-weight:600;color:var(--text-muted);margin-top:4px;">' + App.escapeHtml(classLabel) + '</div>';
      lastClass = classLabel;
    }
    var info = s.name + '（' + s._grade + '，' + s._className + '）';
    if (s.personality) info += '\n个性特点：' + s.personality;
    if (s.habits) info += '\n行为习惯：' + s.habits;
    if (s.notes) info += '\n备注：' + s.notes;
    html += '<span class="chip" data-student-info="' + App.escapeHtml(info).replace(/"/g, '&quot;') + '" onclick="GenPage_toggleStudentChip(this,' + s.id + ')" style="cursor:pointer;user-select:none;">' + App.escapeHtml(s.name) + '</span>';
  });

  container.innerHTML = html;
}

(function initGeneratePlan() {
  GeneratorWorkflow.init();
  GeneratorWorkflow._renderTemplateList(document.getElementById('template-list'));

  // Determine type from URL params
  var params = Router.currentParams || {};
  var type = params.type || 'plan';
  GeneratorWorkflow._currentType = type;

  var typeNames = { plan: '教案', observation: '观察记录', story: '课程故事', paper: '论文', other: '内容' };
  var typeName = typeNames[type] || '教案';

  var typeIcons = { plan: '📝', observation: '👁️', story: '📖', paper: '📄', other: '✨' };
  var typeIcon = typeIcons[type] || '📝';

  document.getElementById('gen-type-title').textContent = typeIcon + ' 生成' + typeName;

  // Update resource hint
  ResourceDB.count(type).then(function(count) {
    if (count > 0) {
      document.getElementById('gen-resource-hint').textContent = 'AI 自动参考资源库中 ' + count + ' 篇优秀' + typeName;
    }
    document.getElementById('gen-context-hint').textContent = '本次生成将参考：资源库 ' + count + ' 篇 + 模板 ' + GeneratorWorkflow._sessionTemplates.length + ' 篇';
  });

  // Show student selector for observation and story types
  if (type === 'observation' || type === 'story') {
    document.getElementById('student-selector-section').style.display = 'block';
    GenPage_loadStudentSelector();
  }

  // Bind generate button
  document.getElementById('gen-btn').addEventListener('click', function() {
    GeneratorWorkflow.generate(type);
  });

  // Bind voice button to requirements textarea
  var voiceBtn = document.getElementById('global-voice-btn');
  if (voiceBtn) voiceBtn.style.display = 'block';
})();
</script>
