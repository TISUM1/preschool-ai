<div class="page-header">
  <h2>⚙️ 设置</h2>
</div>

<!-- API Settings -->
<div class="card">
  <div class="card-title">🤖 AI API 设置</div>

  <label class="label">API 预设</label>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;" id="api-preset-selector">
    <span class="tag active" data-preset="deepseek" onclick="SettingsPage.selectPreset('deepseek')">DeepSeek</span>
    <span class="tag" data-preset="qwen" onclick="SettingsPage.selectPreset('qwen')">通义千问</span>
    <span class="tag" data-preset="custom" onclick="SettingsPage.selectPreset('custom')">自定义</span>
  </div>

  <label class="label">API 地址</label>
  <input class="input-box" id="set-api-url" placeholder="https://api.deepseek.com/v1" style="font-size:13px;margin-bottom:8px;" onchange="SettingsPage.onFieldChange()">

  <label class="label">API Key</label>
  <input class="input-box" id="set-api-key" type="password" placeholder="sk-..." style="font-size:13px;margin-bottom:8px;" onchange="SettingsPage.onFieldChange()">

  <label class="label">模型名称</label>
  <div style="display:flex;gap:8px;">
    <input class="input-box" id="set-model" placeholder="deepseek-chat" style="font-size:13px;flex:1;" onchange="SettingsPage.onFieldChange()">
    <button class="btn btn-outline btn-sm" onclick="SettingsPage.testConnection()">测试连接</button>
  </div>

  <div style="font-size:11px;color:var(--text-muted);margin-top:8px;background:#FFFBF0;padding:8px;border-radius:8px;">
    💡 兼容 OpenAI 的 API 均可使用，中转站请选择「自定义」填入地址和 Key
  </div>
</div>

<!-- Theme -->
<div class="card">
  <div class="card-title">🎨 外观主题</div>
  <div style="display:flex;gap:8px;" id="theme-selector">
    <div style="width:40px;height:40px;border-radius:20px;background:linear-gradient(135deg,#FF9EB5,#F0728C);cursor:pointer;" data-theme="pastel" onclick="SettingsPage.setTheme('pastel')"></div>
    <div style="width:40px;height:40px;border-radius:20px;background:linear-gradient(135deg,#52C41A,#389E0D);cursor:pointer;" data-theme="forest" onclick="SettingsPage.setTheme('forest')"></div>
    <div style="width:40px;height:40px;border-radius:20px;background:linear-gradient(135deg,#1890FF,#096DD9);cursor:pointer;" data-theme="ocean" onclick="SettingsPage.setTheme('ocean')"></div>
    <div style="width:40px;height:40px;border-radius:20px;background:linear-gradient(135deg,#FA8C16,#D46B08);cursor:pointer;" data-theme="warm" onclick="SettingsPage.setTheme('warm')"></div>
    <div style="width:40px;height:40px;border-radius:20px;background:linear-gradient(135deg,#9254DE,#722ED1);cursor:pointer;" data-theme="lavender" onclick="SettingsPage.setTheme('lavender')"></div>
  </div>
</div>

<!-- Profile -->
<div class="card">
  <div class="card-title">👤 个人信息</div>
  <label class="label">称呼</label>
  <input class="input-box" id="set-name" placeholder="计老师" style="font-size:13px;" onchange="SettingsPage.onFieldChange()">
</div>

<!-- Footer -->
<div style="text-align:center;padding:8px 0 16px;">
  <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">📱 Alice专属 v5.20</div>
  <button class="btn btn-outline btn-sm" onclick="SettingsPage.exportAll()">导出数据</button>
  <button class="btn btn-outline btn-sm" style="margin-left:6px;color:var(--error);border-color:var(--error);" onclick="SettingsPage.clearAll()">清除数据</button>
</div>

<script>
var SettingsPage = {
  _preset: 'deepseek',

  init: async function() {
    var provider = AppSettings.getApiProvider();
    var apiUrl = AppSettings.getApiUrl();
    var apiKey = AppSettings.getApiKey();
    var model = AppSettings.getModel();
    var theme = AppSettings.getTheme();
    var name = AppSettings.getTeacherName();

    // Determine preset
    if (apiUrl && apiUrl.includes('deepseek')) this._preset = 'deepseek';
    else if (apiUrl && apiUrl.includes('dashscope')) this._preset = 'qwen';
    else this._preset = 'custom';

    document.getElementById('set-api-url').value = apiUrl || '';
    document.getElementById('set-api-key').value = apiKey || '';
    document.getElementById('set-model').value = model || '';
    document.getElementById('set-name').value = name === '计老师' ? '' : name;

    this.selectPreset(this._preset);
    this._highlightTheme(theme);
  },

  selectPreset: function(preset) {
    this._preset = preset;
    document.querySelectorAll('#api-preset-selector .tag').forEach(function(t) {
      t.classList.toggle('active', t.dataset.preset === preset);
    });

    var presets = {
      deepseek: { url: 'https://api.deepseek.com/v1', model: 'deepseek-chat' },
      qwen: { url: 'https://dashscope.aliyuncs.com/compatible-mode/v1', model: 'qwen-plus' },
      custom: { url: '', model: '' }
    };

    var p = presets[preset];
    if (preset !== 'custom') {
      document.getElementById('set-api-url').value = p.url;
      document.getElementById('set-model').value = p.model;
    }
    this.saveApiSettings();
  },

  onFieldChange: function() {
    this._preset = 'custom';
    document.querySelectorAll('#api-preset-selector .tag').forEach(function(t) {
      t.classList.toggle('active', t.dataset.preset === 'custom');
    });
    this.saveApiSettings();
  },

  saveApiSettings: async function() {
    await AppSettings.set('apiProvider', this._preset);
    await AppSettings.set('apiUrl', document.getElementById('set-api-url').value.trim());
    await AppSettings.set('apiKey', document.getElementById('set-api-key').value.trim());
    await AppSettings.set('model', document.getElementById('set-model').value.trim());
    var nameVal = document.getElementById('set-name').value.trim();
    if (nameVal) await AppSettings.set('teacherName', nameVal);
  },

  setTheme: async function(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    await AppSettings.set('theme', theme);
    this._highlightTheme(theme);
    Toast.show('主题已切换');
  },

  _highlightTheme: function(theme) {
    document.querySelectorAll('#theme-selector div').forEach(function(d) {
      var isActive = d.dataset.theme === theme;
      d.style.border = isActive ? '3px solid white' : '3px solid transparent';
      d.style.boxShadow = isActive ? '0 0 0 2px var(--primary)' : 'none';
    });
  },

  testConnection: async function() {
    await this.saveApiSettings();
    var key = document.getElementById('set-api-key').value.trim();
    if (!key) {
      Toast.show('请先填写 API Key', 'error');
      return;
    }
    App.showLoading('测试连接...');
    try {
      var msg = await ApiClient.chat([{ role: 'user', content: '你好，回复"连接成功"' }], { stream: false, max_tokens: 20 });
      App.hideLoading();
      Toast.show('连接成功', 'success');
    } catch(e) {
      App.hideLoading();
      Toast.show('连接失败: ' + e.message, 'error');
    }
  },

  exportAll: function() {
    Toast.show('数据导出功能将在第2阶段实现');
  },

  clearAll: function() {
    if (confirm('确定要清除所有本地数据吗？此操作不可恢复。')) {
      db.delete().then(function() {
        Toast.show('数据已清除，请刷新页面');
        setTimeout(function() { location.reload(); }, 1500);
      });
    }
  }
};

SettingsPage.init();
</script>
