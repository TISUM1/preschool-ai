<div class="page-header">
  <div class="back-row">
    <span class="back-btn" onclick="Router.navigate('home')">←</span>
    <h2>⚙️ 设置</h2>
  </div>
</div>

<!-- API Settings -->
<div class="card">
  <div class="card-title">🔑 API 配置</div>

  <label class="label">API 地址</label>
  <input class="input-box" id="set-api-url" placeholder="https://api.example.com/v1">

  <label class="label" style="margin-top:10px;">API Key</label>
  <input class="input-box" id="set-api-key" type="password" placeholder="sk-...">

  <label class="label" style="margin-top:10px;">模型名称</label>
  <input class="input-box" id="set-model" placeholder="deepseek-chat">

  <button class="btn btn-outline btn-block" style="margin-top:10px;" onclick="SettingsPage.testConnection()">🔗 测试连接</button>
  <div id="set-test-result" style="font-size:11px;margin-top:6px;text-align:center;"></div>
</div>

<!-- Rewrite Model Settings -->
<div class="card">
  <div class="card-title">🔄 降重模型（可选）</div>
  <div style="font-size:11px;color:var(--text-muted);margin-bottom:10px;">配置第二个模型用于降重改写，与主模型搭配效果更佳</div>

  <label class="label">API 地址</label>
  <input class="input-box" id="set-rewrite-url" placeholder="https://api.example.com/v1">

  <label class="label" style="margin-top:10px;">API Key</label>
  <input class="input-box" id="set-rewrite-key" type="password" placeholder="sk-...">

  <label class="label" style="margin-top:10px;">模型名称</label>
  <input class="input-box" id="set-rewrite-model" placeholder="gpt-4o-mini">

  <button class="btn btn-outline btn-block" style="margin-top:10px;" onclick="SettingsPage.testRewriteConnection()">🔗 测试连接</button>
  <div id="set-rewrite-test-result" style="font-size:11px;margin-top:6px;text-align:center;"></div>
</div>

<!-- Teacher Info -->
<div class="card">
  <div class="card-title">👩‍🏫 教师信息</div>

  <label class="label">姓名</label>
  <input class="input-box" id="set-teacher-name" placeholder="计老师">
</div>

<!-- Save Button -->
<button class="btn btn-primary btn-block" onclick="SettingsPage.save()">💾 保存设置</button>

<div style="text-align:center;margin-top:16px;font-size:11px;color:var(--text-muted);">
  Alice 专属 · v2.01
</div>

<script>
var SettingsPage = {

  init: function() {
    document.getElementById('set-api-url').value = AppSettings.getApiUrl();
    document.getElementById('set-api-key').value = AppSettings.getApiKey();
    document.getElementById('set-model').value = AppSettings.getModel();
    document.getElementById('set-rewrite-url').value = AppSettings.getRewriteApiUrl();
    document.getElementById('set-rewrite-key').value = AppSettings.getRewriteApiKey();
    document.getElementById('set-rewrite-model').value = AppSettings.getRewriteModel();
    document.getElementById('set-teacher-name').value = AppSettings.getTeacherName();
  },

  save: async function() {
    await AppSettings.set('apiUrl', document.getElementById('set-api-url').value.trim());
    await AppSettings.set('apiKey', document.getElementById('set-api-key').value.trim());
    await AppSettings.set('model', document.getElementById('set-model').value.trim());
    await AppSettings.set('rewriteApiUrl', document.getElementById('set-rewrite-url').value.trim());
    await AppSettings.set('rewriteApiKey', document.getElementById('set-rewrite-key').value.trim());
    await AppSettings.set('rewriteModel', document.getElementById('set-rewrite-model').value.trim());
    await AppSettings.set('teacherName', document.getElementById('set-teacher-name').value.trim());
    Toast.show('设置已保存');
  },

  testConnection: async function() {
    var url = document.getElementById('set-api-url').value.trim();
    var key = document.getElementById('set-api-key').value.trim();
    var model = document.getElementById('set-model').value.trim();
    var resultEl = document.getElementById('set-test-result');

    if (!url || !key || !model) {
      resultEl.textContent = '请先填写完整的 API 地址、Key 和模型名称';
      resultEl.style.color = '#FF4D4F';
      return;
    }

    resultEl.textContent = '正在测试连接...';
    resultEl.style.color = 'var(--text-muted)';

    try {
      var response = await ApiClient.chat(
        [{ role: 'user', content: '你好，请回复"连接成功"' }],
        { apiUrl: url, apiKey: key, model: model }
      );
      resultEl.textContent = '✅ 连接成功：' + (response || '已响应');
      resultEl.style.color = '#52C41A';
    } catch(e) {
      resultEl.textContent = '❌ 连接失败：' + e.message;
      resultEl.style.color = '#FF4D4F';
    }
  },

  testRewriteConnection: async function() {
    var url = document.getElementById('set-rewrite-url').value.trim();
    var key = document.getElementById('set-rewrite-key').value.trim();
    var model = document.getElementById('set-rewrite-model').value.trim();
    var resultEl = document.getElementById('set-rewrite-test-result');

    if (!url || !key || !model) {
      resultEl.textContent = '请先填写完整的降重模型 API 地址、Key 和模型名称';
      resultEl.style.color = '#FF4D4F';
      return;
    }

    resultEl.textContent = '正在测试连接...';
    resultEl.style.color = 'var(--text-muted)';

    try {
      var response = await ApiClient.chat(
        [{ role: 'user', content: '你好，请回复"连接成功"' }],
        { apiUrl: url, apiKey: key, model: model }
      );
      resultEl.textContent = '✅ 连接成功：' + (response || '已响应');
      resultEl.style.color = '#52C41A';
    } catch(e) {
      resultEl.textContent = '❌ 连接失败：' + e.message;
      resultEl.style.color = '#FF4D4F';
    }
  }
};

SettingsPage.init();
</script>
