<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF9EB5">
  <meta name="description" content="幼师AI助手 - 生成高质量教案、观察记录、论文">
  <title>幼师AI助手</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/dexie/dist/dexie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mammoth/mammoth.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist/build/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx/build/index.min.js"></script>
</head>
<body>

<div id="app">
  <main id="page-content"></main>

  <nav id="bottom-nav">
    <button class="nav-item active" data-page="home">
      <span class="nav-icon">🏠</span><span class="nav-label">首页</span>
    </button>
    <button class="nav-item" data-page="library">
      <span class="nav-icon">📚</span><span class="nav-label">资源库</span>
    </button>
    <button class="nav-item" data-page="documents">
      <span class="nav-icon">📂</span><span class="nav-label">历史文档</span>
    </button>
    <button class="nav-item" data-page="settings">
      <span class="nav-icon">⚙️</span><span class="nav-label">设置</span>
    </button>
  </nav>

  <button id="global-voice-btn" class="fab" title="语音输入">🎤</button>
  <div id="toast-container"></div>
  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
    <p id="loading-text">加载中...</p>
  </div>
  <div id="install-banner" class="hidden">
    <span>添加到主屏幕，使用更方便</span>
    <button id="install-btn">立即添加</button>
    <button id="dismiss-btn">✕</button>
  </div>
</div>

<script src="js/db.js"></script>
<script src="js/router.js"></script>
<script src="js/settings.js"></script>
<script src="js/api.js"></script>
<script src="js/voice-input.js"></script>
<script src="js/template-parser.js"></script>
<script src="js/resource-library.js"></script>
<script src="js/prompt-builder.js"></script>
<script src="js/docx-exporter.js"></script>
<script src="js/paper-workflow.js"></script>
<script src="js/generator-workflow.js"></script>
<script src="js/app.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js', { scope: './' }).catch(function(){});
  }
</script>
</body>
</html>
