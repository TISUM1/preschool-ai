<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>幼师AI助手</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7C3AED">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css?v=12">
</head>
<body>
  <div id="app">
    <div id="page-content"></div>
    <nav id="bottom-nav">
      <span class="nav-item active" data-page="home" onclick="Router.navigate('home')">🏠</span>
      <span class="nav-item" data-page="library" onclick="Router.navigate('library')">📚</span>
      <span class="nav-item" data-page="documents" onclick="Router.navigate('documents')">📄</span>
      <span class="nav-item" data-page="settings" onclick="Router.navigate('settings')">⚙️</span>
    </nav>
  </div>

  <script src="js/db.js?v=12"></script>
  <script src="js/settings.js?v=12"></script>
  <script src="js/api.js?v=12"></script>
  <script src="js/app.js?v=12"></script>
  <script src="js/router.js?v=12"></script>
  <script src="js/prompt-builder.js?v=12"></script>
  <script src="js/resource-library.js?v=12"></script>
  <script src="js/generator-workflow.js?v=12"></script>
  <script src="js/paper-workflow.js?v=12"></script>
  <script src="js/template-parser.js?v=12"></script>
  <script src="js/docx-exporter.js?v=12"></script>

  <!-- Toast -->
  <div id="toast-container"></div>

  <!-- Loading -->
  <div id="loading-overlay" style="display:none;">
    <div class="loading-spinner"></div>
    <div id="loading-text" style="margin-top:12px;color:#fff;font-size:14px;">加载中...</div>
  </div>

  <!-- Voice Button (floating) -->
  <button id="global-voice-btn" style="display:none;position:fixed;bottom:24px;right:24px;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#A78BFA);color:#fff;border:none;font-size:20px;box-shadow:0 2px 8px rgba(124,58,237,0.3);z-index:999;cursor:pointer;" onclick="App.startVoice()">🎤</button>
</body>
</html>
