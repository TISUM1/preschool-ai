<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幼师AI助手 - UI原型 v2</title>
  <style>
    :root {
      --primary: #FF9EB5;
      --primary-dark: #F0728C;
      --primary-light: #FFD4E0;
      --bg: #FFF5F7;
      --surface: #FFF;
      --text: #2D2D2D;
      --text-secondary: #6B6B6B;
      --text-muted: #999;
      --border: #E8E8E8;
      --radius: 16px;
      --radius-sm: 10px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family: -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
      background:#F0F0F0;display:flex;justify-content:center;align-items:flex-start;
      padding:20px;min-height:100vh;
    }
    .phone-frame{
      width:390px;min-height:844px;background:var(--bg);border-radius:32px;
      overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.15);
      display:flex;flex-direction:column;
    }
    .status-bar{
      height:44px;background:var(--surface);display:flex;align-items:center;
      justify-content:space-between;padding:0 24px;font-size:12px;font-weight:600;
      color:var(--text);
    }
    .page-header{
      padding:12px 20px 16px;background:var(--surface);border-bottom:1px solid var(--border);
    }
    .page-header h2{font-size:22px;color:var(--text);}
    .page-header .subtitle{font-size:13px;color:var(--text-muted);margin-top:2px;}

    .page-content{flex:1;overflow-y:auto;padding:16px;}

    /* Bottom Nav - 4 items */
    .bottom-nav{
      height:64px;background:var(--surface);display:flex;align-items:center;
      border-top:1px solid var(--border);flex-shrink:0;
    }
    .nav-item{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      border:none;background:none;font-size:11px;color:var(--text-muted);cursor:pointer;
      padding:4px 0;
    }
    .nav-item .nav-icon{font-size:20px;margin-bottom:2px;}
    .nav-item.active{color:var(--primary-dark);}

    /* Cards */
    .card{
      background:var(--surface);border-radius:var(--radius);padding:16px;
      margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04);
    }
    .card-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px;}

    /* Buttons */
    .btn{padding:10px 20px;border-radius:24px;border:none;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;}
    .btn-primary{background:var(--primary);color:#fff;}
    .btn-primary:active{background:var(--primary-dark);}
    .btn-outline{background:transparent;border:1.5px solid var(--primary);color:var(--primary-dark);}
    .btn-sm{padding:6px 14px;font-size:12px;border-radius:16px;}
    .btn-block{width:100%;padding:14px;text-align:center;}

    .input-box{
      width:100%;padding:12px 14px;border:1.5px solid var(--border);
      border-radius:var(--radius-sm);font-size:15px;font-family:inherit;
      background:#F8F8F8;color:var(--text);resize:none;
    }
    .input-box:focus{outline:none;border-color:var(--primary);background:#fff;}

    .label{font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:6px;display:block;}

    .chip{
      display:inline-block;padding:4px 12px;background:var(--primary-light);
      color:var(--primary-dark);border-radius:12px;font-size:12px;font-weight:500;margin:2px;
    }
    .chip.selected{background:var(--primary);color:#fff;}

    .tag{
      display:inline-block;padding:6px 14px;background:var(--surface);
      border:1.5px solid var(--border);border-radius:20px;font-size:13px;
      cursor:pointer;margin:3px;
    }
    .tag.active{background:var(--primary);color:#fff;border-color:var(--primary);}

    .badge{
      display:inline-block;padding:3px 8px;border-radius:8px;font-size:11px;font-weight:500;
    }
    .badge-plan{background:#FFD4E0;color:#D0486C;}
    .badge-obs{background:#BAE7FF;color:#096DD9;}
    .badge-paper{background:#EFDBFF;color:#722ED1;}
    .badge-other{background:#D9F7BE;color:#389E0D;}

    .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;}
    .toggle-label{font-size:14px;color:var(--text);}
    .toggle{
      width:48px;height:28px;background:#CCC;border-radius:14px;cursor:pointer;
      position:relative;transition:background .2s;
    }
    .toggle.on{background:var(--primary);}
    .toggle::after{
      content:'';position:absolute;width:24px;height:24px;background:#fff;
      border-radius:12px;top:2px;left:2px;transition:left .2s;
    }
    .toggle.on::after{left:22px;}

    .file-row{
      display:flex;align-items:center;padding:10px 12px;background:#F8F8F8;
      border-radius:var(--radius-sm);margin:4px 0;font-size:13px;
    }
    .file-row .file-icon{font-size:20px;margin-right:10px;}
    .file-row .file-info{flex:1;}
    .file-row .file-name{font-size:13px;color:var(--text);font-weight:500;}
    .file-row .file-meta{font-size:11px;color:var(--text-muted);}

    .step-indicator{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
    .step-dot{width:8px;height:8px;border-radius:4px;background:var(--border);transition:all .2s;}
    .step-dot.done{background:var(--primary);}
    .step-dot.current{background:var(--primary);width:24px;}

    /* Screen selector */
    .screen-selector{
      position:fixed;top:8px;left:50%;transform:translateX(-50%);
      background:#fff;border-radius:20px;padding:6px 12px;
      box-shadow:0 4px 16px rgba(0,0,0,.12);font-size:11px;z-index:100;
      display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-width:95vw;
    }
    .screen-selector button{
      padding:4px 8px;border-radius:12px;border:1px solid var(--border);
      background:#fff;font-size:10px;cursor:pointer;font-family:inherit;
      white-space:nowrap;
    }
    .screen-selector button.sel{background:var(--primary);color:#fff;border-color:var(--primary);}

    /* Large entry buttons for paper */
    .entry-btn{
      display:block;width:100%;padding:28px 20px;border-radius:var(--radius);
      border:2px solid var(--border);background:var(--surface);cursor:pointer;
      text-align:left;margin-bottom:12px;transition:all .2s;
    }
    .entry-btn:active{border-color:var(--primary);background:var(--primary-light);}
    .entry-btn .entry-icon{font-size:36px;margin-bottom:8px;}
    .entry-btn .entry-title{font-size:18px;font-weight:600;color:var(--text);}
    .entry-btn .entry-desc{font-size:13px;color:var(--text-muted);margin-top:4px;}
  </style>
</head>
